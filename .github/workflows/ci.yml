name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ===========================================================================
  # Discord Bot - Lint
  # ===========================================================================
  bot-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/discord-bot

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: apps/discord-bot/requirements*.txt

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff check
        run: ruff check .

      - name: Run Ruff format check
        run: ruff format --check .

  # ===========================================================================
  # Discord Bot - Test
  # ===========================================================================
  bot-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/discord-bot

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: studybot
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: studybot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: apps/discord-bot/requirements*.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql://studybot:testpass@localhost:5432/studybot_test
          DISCORD_TOKEN: test_token
        run: pytest --cov=studybot --cov-report=term-missing -v

  # ===========================================================================
  # API - Lint
  # ===========================================================================
  api-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: apps/api/requirements*.txt

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff check
        run: ruff check .

      - name: Run Ruff format check
        run: ruff format --check .

  # ===========================================================================
  # API - Test
  # ===========================================================================
  api-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: studybot
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: studybot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: apps/api/requirements*.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio pytest-cov

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql://studybot:testpass@localhost:5432/studybot_test
          API_SECRET_KEY: test_secret
        run: pytest tests/ -v --cov=api --cov-report=term-missing

  # ===========================================================================
  # Web - Lint & Type Check
  # ===========================================================================
  web-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript type check
        run: npx tsc --noEmit

  # ===========================================================================
  # Web - Build
  # ===========================================================================
  web-build:
    runs-on: ubuntu-latest
    needs: [web-lint]
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  # ===========================================================================
  # Python Type Check (mypy) - non-blocking
  # ===========================================================================
  python-typecheck:
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        include:
          - app: discord-bot
            src: studybot
          - app: api
            src: api

    defaults:
      run:
        working-directory: apps/${{ matrix.app }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: apps/${{ matrix.app }}/requirements*.txt

      - name: Install dependencies and mypy
        run: |
          pip install -r requirements.txt
          pip install mypy

      - name: Run mypy
        run: mypy ${{ matrix.src }} --ignore-missing-imports --no-error-summary || true

  # ===========================================================================
  # Docker Build
  # ===========================================================================
  docker:
    runs-on: ubuntu-latest
    needs: [bot-lint, bot-test, api-lint, api-test, web-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Bot Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/discord-bot
          push: false
          tags: studybot-bot:latest
          cache-from: type=gha,scope=bot
          cache-to: type=gha,mode=max,scope=bot

      - name: Build API Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/api
          push: false
          tags: studybot-api:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build Web Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/web
          push: false
          tags: studybot-web:latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
