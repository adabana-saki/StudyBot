      - "web"
    commit-message:
      prefix: "chore(deps):"

  # -------------------------------------------------------------------------
  # Docker - Mobile App
  # -------------------------------------------------------------------------
  - package-ecosystem: "docker"
    directory: "/apps/mobile-app"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
