version: 2
updates:
  # -------------------------------------------------------------------------
  # Python (pip) - Discord Bot
  # -------------------------------------------------------------------------
  - package-ecosystem: "pip"
    directory: "/apps/discord-bot"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "python"
      - "bot"
    commit-message:
      prefix: "chore(deps):"
    open-pull-requests-limit: 10

  # -------------------------------------------------------------------------
  # Python (pip) - API
  # -------------------------------------------------------------------------
  - package-ecosystem: "pip"
    directory: "/apps/api"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "python"
      - "api"
    commit-message:
      prefix: "chore(deps):"
    open-pull-requests-limit: 10

  # -------------------------------------------------------------------------
  # npm - Web App
  # -------------------------------------------------------------------------
