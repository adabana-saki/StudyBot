services:
  postgres:
    image: postgres:16-alpine
    container_name: studybot-postgres
    environment:
      POSTGRES_USER: studybot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-studybot_dev}
      POSTGRES_DB: studybot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studybot"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    networks:
      - studybot-network

  bot:
    build:
      context: ./apps/discord-bot
      dockerfile: Dockerfile
    container_name: studybot-bot
    restart: unless-stopped
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DATABASE_URL: postgresql://studybot:${POSTGRES_PASSWORD:-studybot_dev}@postgres:5432/studybot
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DB_POOL_MIN_SIZE: 1
      DB_POOL_MAX_SIZE: 5
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - studybot-network

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: studybot-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://studybot:${POSTGRES_PASSWORD:-studybot_dev}@postgres:5432/studybot
      API_SECRET_KEY: ${API_SECRET_KEY:-change-me-in-production}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:-}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET:-}
      DISCORD_REDIRECT_URI: ${DISCORD_REDIRECT_URI:-http://localhost:8000/api/auth/callback}
      WEB_BASE_URL: ${WEB_BASE_URL:-http://localhost:3000}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - studybot-network

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: studybot-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://api:8000
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - studybot-network

networks:
  studybot-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
